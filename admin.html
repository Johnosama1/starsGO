<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - starGo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #071028;
            color: #fff;
            padding: 20px;
        }
        .password-form {
            max-width: 400px;
            margin: 100px auto;
            background: #14293f;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #1f3a56;
            text-align: center;
        }
        .password-form i {
            font-size: 60px;
            color: #4dd0ff;
            margin-bottom: 20px;
        }
        .password-form h2 {
            color: #ffd966;
            margin-bottom: 10px;
        }
        .password-form p {
            color: #9fb7d8;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .password-form input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid #1f3a56;
            border-radius: 8px;
            background: #0b2130;
            color: #fff;
            font-size: 16px;
        }
        .password-form button {
            width: 100%;
            padding: 15px;
            background: #0d6efd;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .password-form button:hover {
            background: #0b5ed7;
        }
        #errorMsg {
            color: #ff5555;
            margin-top: 15px;
            display: none;
            padding: 10px;
            background: rgba(255, 85, 85, 0.1);
            border-radius: 8px;
        }
        .hidden { display: none !important; }
        
        /* Dashboard Styles */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #1e3a5f;
        }
        .header h1 { color: #ffd966; }
        .logout-btn {
            background: #c0392b;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #14293f;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #1f3a56;
        }
        .stat-card i {
            font-size: 30px;
            color: #4dd0ff;
            margin-bottom: 10px;
        }
        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #ffd966;
        }
        .stat-label {
            color: #9fb7d8;
            font-size: 14px;
        }
        .section {
            background: #14293f;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #1f3a56;
        }
        .section h2 {
            color: #4dd0ff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #1f3a56;
        }
        th {
            color: #9fb7d8;
            font-weight: 600;
        }
        td {
            color: #e6f7ff;
        }
        .status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-completed { background: #00c853; color: #000; }
        .status-pending { background: #ff9100; color: #000; }
        .status-failed { background: #ff5555; color: #fff; }
        .empty {
            text-align: center;
            color: #9fb7d8;
            padding: 40px;
        }
        .refresh-btn {
            background: #0d6efd;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .clear-btn {
            background: #c0392b;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<!-- Login Form -->
<div id="loginForm" class="password-form">
    <i class="fas fa-user-shield"></i>
    <h2>Admin Access</h2>
    <p>🔒 هذه الصفحة محمية. أدخل كلمة المرور للمتابعة.</p>
    <input type="password" id="adminPassword" placeholder="Enter password">
    <button onclick="checkPassword()">
        <i class="fas fa-lock"></i> دخول
    </button>
    <div id="errorMsg">
        <i class="fas fa-exclamation-triangle"></i> كلمة المرور غير صحيحة!
    </div>
</div>

<!-- Admin Dashboard -->
<div id="adminPanel" class="hidden">
    <div class="header">
        <h1><i class="fas fa-crown"></i> starGo Admin</h1>
        <div>
            <button class="refresh-btn" onclick="loadData()">
                <i class="fas fa-sync-alt"></i> تحديث
            </button>
            <button class="clear-btn" onclick="clearAllData()">
                <i class="fas fa-trash"></i> مسح الكل
            </button>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> خروج
            </button>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="stat-card">
            <i class="fas fa-shopping-cart"></i>
            <div class="stat-number" id="totalOrders">0</div>
            <div class="stat-label">إجمالي الطلبات</div>
        </div>
        <div class="stat-card">
            <i class="fas fa-star"></i>
            <div class="stat-number" id="starsOrders">0</div>
            <div class="stat-label">طلبات النجوم</div>
        </div>
        <div class="stat-card">
            <i class="fas fa-gem"></i>
            <div class="stat-number" id="premiumOrders">0</div>
            <div class="stat-label">طلبات Premium</div>
        </div>
        <div class="stat-card">
            <i class="fas fa-wallet"></i>
            <div class="stat-number" id="totalTon">0</div>
            <div class="stat-label">إجمالي TON</div>
        </div>
    </div>

    <!-- Orders -->
    <div class="section">
        <h2><i class="fas fa-list"></i> الطلبات</h2>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>النوع</th>
                    <th>المستخدم</th>
                    <th>التفاصيل</th>
                    <th>TON</th>
                    <th>التاريخ</th>
                    <th>الحالة</th>
                </tr>
            </thead>
            <tbody id="ordersBody">
                <tr><td colspan="7" class="empty">جاري التحميل...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Wallets -->
    <div class="section">
        <h2><i class="fas fa-wallet"></i> المحافظ المتصلة</h2>
        <table>
            <thead>
                <tr>
                    <th>العنوان</th>
                    <th>المزود</th>
                    <th>تاريخ الاتصال</th>
                </tr>
            </thead>
            <tbody id="walletsBody">
                <tr><td colspan="3" class="empty">جاري التحميل...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>0
// ✅ غيّر الباسورد لحاجة قوية وصعبة
const ADMIN_PASSWORD = 'Jo505$ho55#@'; // غيّرها!

// ✅ حماية إضافية - التحقق من المصدر
if (document.referrer && !document.referrer.includes(window.location.hostname)) {
    console.warn('⚠️ External referrer detected');
}

function checkPassword() {
    const input = document.getElementById('adminPassword').value;
    
    if (input === ADMIN_PASSWORD) {
        // ✅ تسجيل وقت الدخول
        sessionStorage.setItem('adminLoggedIn', Date.now());
        
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
        loadData();
    } else {
        document.getElementById('errorMsg').style.display = 'block';
        
        // ✅ تأخير عشان ميحاولش كتير
        setTimeout(() => {
            document.getElementById('errorMsg').style.display = 'none';
        }, 3000);
    }
}

function logout() {
    sessionStorage.removeItem('adminLoggedIn');
    document.getElementById('adminPanel').classList.add('hidden');
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('adminPassword').value = '';
}

function loadData() {
    // ✅ التحقق من تسجيل الدخول
    if (!sessionStorage.getItem('adminLoggedIn')) {
        logout();
        return;
    }
    
    const orders = JSON.parse(localStorage.getItem('orders') || '[]');
    const walletData = localStorage.getItem('connected_wallet');
    const wallets = walletData ? [JSON.parse(walletData)] : [];
    
    // Stats
    const starsCount = orders.filter(o => o.type === 'stars').length;
    const premiumCount = orders.filter(o => o.type === 'premium').length;
    const totalTon = orders.reduce((sum, o) => sum + (parseFloat(o.tonAmount) || 0), 0);
    
    document.getElementById('totalOrders').textContent = orders.length;
    document.getElementById('starsOrders').textContent = starsCount;
    document.getElementById('premiumOrders').textContent = premiumCount;
    document.getElementById('totalTon').textContent = totalTon.toFixed(4);
    
    // Orders Table
    const ordersBody = document.getElementById('ordersBody');
    if (orders.length === 0) {
        ordersBody.innerHTML = '<tr><td colspan="7" class="empty">لا توجد طلبات</td></tr>';
    } else {
        ordersBody.innerHTML = orders.reverse().map((order, index) => `
            <tr>
                <td>${orders.length - index}</td>
                <td>${order.type === 'stars' ? '⭐ نجوم' : '💎 Premium'}</td>
                <td>${order.username || '-'}</td>
                <td>${order.plan || (order.amount + ' نجمة') || '-'}</td>
                <td>${order.tonAmount || '-'}</td>
                <td>${order.date || '-'}</td>
                <td><span class="status status-${order.status || 'completed'}">${order.status || 'completed'}</span></td>
            </tr>
        `).join('');
    }
    
    // Wallets Table
    const walletsBody = document.getElementById('walletsBody');
    if (wallets.length === 0) {
        walletsBody.innerHTML = '<tr><td colspan="3" class="empty">لا توجد محافظ</td></tr>';
    } else {
        walletsBody.innerHTML = wallets.map(w => `
            <tr>
                <td style="font-family: monospace;">${w.address || '-'}</td>
                <td>${w.provider || '-'}</td>
                <td>${w.connectedAt || '-'}</td>
            </tr>
        `).join('');
    }
}

function clearAllData() {
    if (!confirm('⚠️ هل أنت متأكد من مسح جميع البيانات؟\n\nهذا الإجراء لا يمكن التراجع عنه!')) {
        return;
    }
    
    if (!confirm('🔴 تأكيد نهائي: سيتم مسح جميع الطلبات والمحافظ المتصلة')) {
        return;
    }
    
    localStorage.removeItem('orders');
    localStorage.removeItem('connected_wallet');
    
    showNotification('✅ تم مسح جميع البيانات', 'success');
    loadData();
}

function showNotification(message, type) {
    // Simple notification
    const div = document.createElement('div');
    div.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        background: ${type === 'success' ? '#00c853' : '#ff5555'};
        color: #fff;
        padding: 15px 25px;
        border-radius: 8px;
        z-index: 9999;
        font-weight: bold;
    `;
    div.textContent = message;
    document.body.appendChild(div);
    
    setTimeout(() => div.remove(), 3000);
}

// Enter key
document.getElementById('adminPassword')?.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') checkPassword();
});

// Auto logout after 30 minutes
setInterval(() => {
    const loginTime = sessionStorage.getItem('adminLoggedIn');
    if (loginTime && Date.now() - loginTime > 30 * 60 * 1000) {
        logout();
        showNotification('⏰ انتهت الجلسة، سجل دخول مرة أخرى', 'warning');
    }
}, 60000); // Check every minute
</script>

</body>
</html>
